<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sovak Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F7F4EE; --cream-dark: #EDE9DF; --cream-darker: #E0DAD0;
    --ink: #1C1917; --ink-soft: #44403C; --ink-muted: #78716C; --ink-faint: #A8A29E;
    --white: #FFFFFF; --accent: #C2570A; --accent-light: #FEF3E8; --accent-mid: #F97316;
    --border: rgba(28,25,23,0.1); --border-soft: rgba(28,25,23,0.06);
    --shadow-md: 0 4px 16px rgba(28,25,23,0.1);
    --shadow-lg: 0 20px 60px rgba(28,25,23,0.18), 0 8px 24px rgba(28,25,23,0.1);
    --r-sm: 8px; --r-md: 12px; --r-lg: 18px; --r-xl: 24px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* HEADER */
  .site-header { padding: 3rem 2rem 2rem; max-width: 1100px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem; flex-wrap: wrap; }
  .header-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  .header-title { font-family: 'Playfair Display', serif; font-size: clamp(36px, 6vw, 58px); font-weight: 500; line-height: 1.05; color: var(--ink); letter-spacing: -0.5px; }
  .header-sub { font-size: 14px; color: var(--ink-muted); margin-top: 10px; font-weight: 300; }
  .count-num { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 400; color: var(--ink); line-height: 1; text-align: right; }
  .count-label { font-size: 12px; color: var(--ink-muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; text-align: right; }
  .header-divider { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
  .header-divider hr { border: none; border-top: 1px solid var(--border); }

  /* NAV */
  .section-nav { max-width: 1100px; margin: 0 auto; padding: 1.25rem 2rem 2rem; display: flex; gap: 8px; flex-wrap: wrap; }
  .nav-btn { padding: 7px 18px; border-radius: 99px; border: 1px solid var(--border); background: var(--white); font-size: 13px; font-weight: 400; color: var(--ink-muted); cursor: pointer; text-decoration: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 7px; font-family: 'DM Sans', sans-serif; }
  .nav-btn:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .nav-btn .nav-count { font-size: 11px; background: var(--cream-dark); color: var(--ink-muted); padding: 1px 7px; border-radius: 99px; transition: all 0.15s; }
  .nav-btn:hover .nav-count { background: rgba(255,255,255,0.2); color: var(--white); }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; }
  .section { margin-bottom: 3.5rem; scroll-margin-top: 1.5rem; }
  .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.25rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--ink); letter-spacing: -0.2px; white-space: nowrap; }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-pill { font-size: 11px; font-weight: 500; color: var(--ink-muted); background: var(--cream-dark); padding: 3px 10px; border-radius: 99px; }

  /* GRID */
  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

  /* CARD */
  .card { background: var(--white); border: 1px solid var(--border-soft); border-radius: var(--r-lg); padding: 1.25rem 1.4rem; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: transparent; transition: background 0.2s ease; border-radius: var(--r-lg) var(--r-lg) 0 0; }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border); }
  .card:hover::before { background: var(--accent-mid); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-emoji { font-size: 22px; line-height: 1; }
  .card-play { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); border: 1px solid rgba(194,87,10,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .card-play svg { width: 10px; height: 10px; fill: var(--accent); margin-left: 1px; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 500; color: var(--ink); line-height: 1.3; margin-bottom: 7px; }
  .card-desc { font-size: 12px; color: var(--ink-muted); line-height: 1.6; margin-bottom: 14px; font-weight: 300; }
  .card-macros { display: flex; gap: 8px; border-top: 1px solid var(--border-soft); padding-top: 12px; flex-wrap: wrap; }
  .macro-item { display: flex; flex-direction: column; align-items: center; min-width: 44px; }
  .macro-val { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1; }
  .macro-lbl { font-size: 9px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .macro-sep { width: 1px; background: var(--border-soft); align-self: stretch; margin: 0 2px; }
  .card-servings { font-size: 10px; color: var(--ink-faint); margin-top: 8px; }

  /* MODAL OVERLAY */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(28,25,23,0.5); z-index: 200; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }

  /* SUMMARY MODAL */
  .modal { background: var(--white); border-radius: var(--r-xl); width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: modalIn 0.2s ease; }
  @keyframes modalIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal-header { padding: 1.75rem 1.75rem 1.25rem; border-bottom: 1px solid var(--border-soft); position: sticky; top: 0; background: var(--white); border-radius: var(--r-xl) var(--r-xl) 0 0; z-index: 1; }
  .modal-header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 1rem; }
  .modal-emoji { font-size: 28px; line-height: 1; margin-bottom: 8px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--ink); line-height: 1.2; }
  .modal-close { background: var(--cream); border: none; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 16px; color: var(--ink-muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .modal-close:hover { background: var(--cream-dark); }
  .modal-macros { display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-macro-pill { background: var(--cream); border-radius: var(--r-sm); padding: 8px 14px; text-align: center; min-width: 68px; }
  .modal-macro-val { font-size: 17px; font-weight: 500; color: var(--ink); line-height: 1; }
  .modal-macro-lbl { font-size: 9px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
  .modal-body { padding: 1.5rem 1.75rem 1.75rem; }
  .modal-section-title { font-size: 10px; font-weight: 500; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; margin-top: 1.4rem; }
  .modal-section-title:first-child { margin-top: 0; }
  .ing-list { display: flex; flex-wrap: wrap; gap: 7px; }
  .ing-tag { font-size: 12px; background: var(--cream); border-radius: var(--r-sm); padding: 5px 12px; color: var(--ink-soft); border: 1px solid var(--border-soft); }
  .method-list { list-style: none; counter-reset: steps; }
  .method-list li { counter-increment: steps; display: flex; gap: 14px; margin-bottom: 12px; font-size: 13.5px; color: var(--ink-soft); line-height: 1.65; font-weight: 300; }
  .method-list li::before { content: counter(steps); min-width: 24px; height: 24px; border-radius: 50%; background: var(--cream-dark); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--ink-muted); flex-shrink: 0; margin-top: 2px; }
  .note-box { background: var(--accent-light); border-left: 3px solid var(--accent-mid); border-radius: 0 var(--r-sm) var(--r-sm) 0; padding: 12px 16px; font-size: 12.5px; color: var(--ink-soft); line-height: 1.7; margin-top: 1.4rem; font-weight: 300; }
  .source-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 1.25rem; font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500; padding: 7px 14px; background: var(--accent-light); border-radius: 99px; border: 1px solid rgba(194,87,10,0.15); transition: background 0.15s; }
  .source-link:hover { background: #fde8d0; }

  /* START COOKING BUTTON */
  .start-cooking-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 1.5rem; padding: 14px; background: var(--ink); color: var(--white); border: none; border-radius: var(--r-md); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s; letter-spacing: 0.2px; }
  .start-cooking-btn:hover { background: var(--ink-soft); }
  .start-cooking-btn:active { transform: scale(0.99); }
  .start-cooking-btn svg { width: 16px; height: 16px; fill: var(--white); }

  /* COOKING MODE */
  .cook-modal { background: var(--white); border-radius: var(--r-xl); width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: modalIn 0.2s ease; display: flex; flex-direction: column; }
  .cook-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; background: var(--white); border-radius: var(--r-xl) var(--r-xl) 0 0; z-index: 1; }
  .cook-recipe-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; color: var(--ink); }
  .cook-header-right { display: flex; align-items: center; gap: 10px; }
  .cook-back-btn { background: var(--cream); border: none; border-radius: 99px; padding: 5px 12px; font-size: 12px; color: var(--ink-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .cook-back-btn:hover { background: var(--cream-dark); }
  .cook-close { background: var(--cream); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 15px; color: var(--ink-muted); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .cook-close:hover { background: var(--cream-dark); }

  /* PROGRESS BAR */
  .cook-progress-wrap { padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border-soft); }
  .cook-progress-labels { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .cook-step-label { font-size: 11px; font-weight: 500; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  .cook-step-total { font-size: 11px; color: var(--ink-faint); }
  .cook-progress-bar { height: 3px; background: var(--cream-dark); border-radius: 99px; overflow: hidden; }
  .cook-progress-fill { height: 100%; background: var(--accent-mid); border-radius: 99px; transition: width 0.4s ease; }

  /* STEP CONTENT */
  .cook-body { padding: 2rem 1.75rem; flex: 1; }
  .cook-step-num { font-size: 11px; font-weight: 500; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; }
  .cook-step-text { font-family: 'Playfair Display', serif; font-size: clamp(18px, 3vw, 22px); font-weight: 400; color: var(--ink); line-height: 1.55; margin-bottom: 2rem; }

  /* TIMER */
  .cook-timer { display: flex; flex-direction: column; align-items: center; background: var(--cream); border-radius: var(--r-lg); padding: 1.5rem; margin-bottom: 2rem; }
  .cook-timer-display { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 400; color: var(--ink); line-height: 1; letter-spacing: -1px; margin-bottom: 1rem; }
  .cook-timer-display.running { color: var(--accent); }
  .cook-timer-display.done { color: #16a34a; }
  .cook-timer-btn { padding: 9px 28px; border-radius: 99px; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .cook-timer-btn.start { background: var(--ink); color: var(--white); }
  .cook-timer-btn.start:hover { background: var(--ink-soft); }
  .cook-timer-btn.pause { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(194,87,10,0.2); }
  .cook-timer-btn.pause:hover { background: #fde8d0; }
  .cook-timer-btn.reset { background: transparent; color: var(--ink-faint); border: 1px solid var(--border); margin-left: 8px; }
  .cook-timer-btn.reset:hover { background: var(--cream-dark); }
  .cook-timer-buttons { display: flex; gap: 0; }
  .cook-timer-done-msg { font-size: 13px; font-weight: 500; color: #16a34a; margin-top: 10px; }

  /* NAV BUTTONS */
  .cook-nav { display: flex; gap: 10px; padding: 1.25rem 1.75rem 1.75rem; border-top: 1px solid var(--border-soft); }
  .cook-nav-btn { flex: 1; padding: 13px; border-radius: var(--r-md); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
  .cook-nav-btn.prev { background: var(--cream); color: var(--ink-muted); }
  .cook-nav-btn.prev:hover:not(:disabled) { background: var(--cream-dark); color: var(--ink); }
  .cook-nav-btn.prev:disabled { opacity: 0.35; cursor: not-allowed; }
  .cook-nav-btn.next { background: var(--ink); color: var(--white); }
  .cook-nav-btn.next:hover { background: var(--ink-soft); }
  .cook-nav-btn.next.finish { background: #16a34a; }
  .cook-nav-btn.next.finish:hover { background: #15803d; }

  /* FOOTER */
  .site-footer { text-align: center; padding: 2rem; font-size: 12px; color: var(--ink-faint); border-top: 1px solid var(--border-soft); max-width: 1100px; margin: 0 auto; }
  .modal::-webkit-scrollbar, .cook-modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb, .cook-modal::-webkit-scrollbar-thumb { background: var(--cream-darker); border-radius: 99px; }

  @media (max-width: 600px) {
    .site-header { padding: 2rem 1.25rem 1.5rem; }
    .section-nav { padding: 1rem 1.25rem 1.5rem; }
    .main { padding: 0 1.25rem 3rem; }
    .header-count { display: none; }
    .modal-header { padding: 1.25rem 1.25rem 1rem; }
    .modal-body { padding: 1.25rem; }
    .cook-body { padding: 1.5rem 1.25rem; }
    .cook-nav { padding: 1rem 1.25rem 1.25rem; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <div class="header-eyebrow">Meal prep cookbook</div>
    <div class="header-title">The Sovak<br>Kitchen</div>
    <div class="header-sub">Curated by Mike &amp; Ali</div>
  </div>
  <div class="header-count">
    <div class="count-num" id="recipe-count">22</div>
    <div class="count-label">Recipes</div>
  </div>
</header>

<div class="header-divider"><hr></div>
<nav class="section-nav" id="section-nav"></nav>
<main class="main" id="main"></main>
<footer class="site-footer">The Sovak Kitchen &mdash; updated April 2026</footer>

<div class="modal-overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div id="modal-container"></div>
</div>

<script>
const recipes = [
  { id:1, category:"breakfast", emoji:"🥣", name:"Overnight oats", source:null, desc:"Protein-packed oats with blueberries and flax. Make the night before.", cal:445, protein:"37g", carbs:"42g", fat:"15g", servings:"1 serving",

const sections = [
  { key:"breakfast", label:"Breakfast" },
  { key:"lunch", label:"Lunch" },
  { key:"dinner", label:"Dinner" },
  { key:"snack", label:"Snacks & sides" }
];

let cookTimer = null;

function buildNav() {
  const nav = document.getElementById('section-nav');
  nav.innerHTML = sections.map(sec => {
    const count = recipes.filter(r => r.category === sec.key).length;
    if (!count) return '';
    return `<a class="nav-btn" href="#section-${sec.key}">${sec.label}<span class="nav-count">${count}</span></a>`;
  }).join('');
}

function buildCard(r) {
  return `<div class="card" onclick="openSummary(${r.id})">
    <div class="card-top">
      <span class="card-emoji">${r.emoji}</span>
      ${r.source ? '<div class="card-play"><svg viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg></div>' : ''}
    </div>
    <div class="card-name">${r.name}</div>
    <div class="card-desc">${r.desc}</div>
    <div class="card-macros">
      <div class="macro-item"><div class="macro-val">${r.cal}</div><div class="macro-lbl">cal</div></div>
      <div class="macro-sep"></div>
      <div class="macro-item"><div class="macro-val">${r.protein}</div><div class="macro-lbl">protein</div></div>
      <div class="macro-sep"></div>
      <div class="macro-item"><div class="macro-val">${r.carbs}</div><div class="macro-lbl">carbs</div></div>
      <div class="macro-sep"></div>
      <div class="macro-item"><div class="macro-val">${r.fat}</div><div class="macro-lbl">fat</div></div>
    </div>
    <div class="card-servings">${r.servings}</div>
  </div>`;
}

function render() {
  buildNav();
  const main = document.getElementById('main');
  let html = '';
  sections.forEach(sec => {
    const group = recipes.filter(r => r.category === sec.key);
    if (!group.length) return;
    html += `<section class="section" id="section-${sec.key}">
      <div class="section-header">
        <h2 class="section-title">${sec.label}</h2>
        <div class="section-line"></div>
        <span class="section-pill">${group.length}</span>
      </div>
      <div class="recipe-grid">${group.map(buildCard).join('')}</div>
    </section>`;
  });
  main.innerHTML = html;
  document.getElementById('recipe-count').textContent = recipes.length;
}

// SUMMARY MODAL
function openSummary(id) {
  clearCookTimer();
  const r = recipes.find(x => x.id === id);
  const methodHtml = r.steps.map(s => `<li>${s.text}</li>`).join('');
  document.getElementById('modal-container').innerHTML = `
    <div class="modal" id="summary-modal">
      <div class="modal-header">
        <div class="modal-header-top">
          <div>
            <div class="modal-emoji">${r.emoji}</div>
            <div class="modal-title">${r.name}</div>
          </div>
          <button class="modal-close" onclick="closeModal()">&#x2715;</button>
        </div>
        <div class="modal-macros">
          <div class="modal-macro-pill"><div class="modal-macro-val">${r.cal}</div><div class="modal-macro-lbl">calories</div></div>
          <div class="modal-macro-pill"><div class="modal-macro-val">${r.protein}</div><div class="modal-macro-lbl">protein</div></div>
          <div class="modal-macro-pill"><div class="modal-macro-val">${r.carbs}</div><div class="modal-macro-lbl">carbs</div></div>
          <div class="modal-macro-pill"><div class="modal-macro-val">${r.fat}</div><div class="modal-macro-lbl">fat</div></div>
          <div class="modal-macro-pill"><div class="modal-macro-val" style="font-size:13px;line-height:1.3;">${r.servings}</div><div class="modal-macro-lbl">servings</div></div>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-section-title">Ingredients</div>
        <div class="ing-list">${r.ingredients.map(i => `<span class="ing-tag">${i}</span>`).join('')}</div>
        <div class="modal-section-title">Method</div>
        <ol class="method-list">${methodHtml}</ol>
        ${r.notes ? `<div class="note-box">${r.notes}</div>` : ''}
        ${r.source ? `<a class="source-link" href="${r.source}" target="_blank">&#9654; Watch original</a>` : ''}
        <button class="start-cooking-btn" onclick="openCooking(${r.id})">
          <svg viewBox="0 0 20 20"><polygon points="4,2 18,10 4,18"/></svg>
          Start cooking
        </button>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('summary-modal').scrollTop = 0;
}

// COOKING MODE
function openCooking(id, stepIndex) {
  clearCookTimer();
  const r = recipes.find(x => x.id === id);
  const idx = stepIndex || 0;
  const step = r.steps[idx];
  const total = r.steps.length;
  const progress = Math.round(((idx + 1) / total) * 100);
  const isLast = idx === total - 1;

  let timerHtml = '';
  if (step.timer) {
    timerHtml = `
      <div class="cook-timer">
        <div class="cook-timer-display" id="timer-display">${formatTime(step.timer)}</div>
        <div class="cook-timer-buttons">
          <button class="cook-timer-btn start" id="timer-btn" onclick="toggleTimer(${id}, ${idx}, ${step.timer})">Start timer</button>
          <button class="cook-timer-btn reset" onclick="resetTimer(${id}, ${idx}, ${step.timer})">Reset</button>
        </div>
      </div>`;
  }

  document.getElementById('modal-container').innerHTML = `
    <div class="cook-modal">
      <div class="cook-header">
        <span class="cook-recipe-name">${r.emoji} ${r.name}</span>
        <div class="cook-header-right">
          <button class="cook-back-btn" onclick="openSummary(${id})">&#8592; Overview</button>
          <button class="cook-close" onclick="closeModal()">&#x2715;</button>
        </div>
      </div>
      <div class="cook-progress-wrap">
        <div class="cook-progress-labels">
          <span class="cook-step-label">Step ${idx + 1}</span>
          <span class="cook-step-total">${idx + 1} of ${total}</span>
        </div>
        <div class="cook-progress-bar"><div class="cook-progress-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="cook-body">
        <div class="cook-step-num">${step.timer ? '&#x23F1; Timed step' : 'No timer'}</div>
        <div class="cook-step-text">${step.text}</div>
        ${timerHtml}
      </div>
      <div class="cook-nav">
        <button class="cook-nav-btn prev" onclick="openCooking(${id}, ${idx - 1})" ${idx === 0 ? 'disabled' : ''}>&#8592; Back</button>
        <button class="cook-nav-btn next ${isLast ? 'finish' : ''}" onclick="${isLast ? 'closeModal()' : `openCooking(${id}, ${idx + 1})`}">
          ${isLast ? '&#x2713; Done' : 'Next &#8594;'}
        </button>
      </div>
    </div>`;
}

// TIMER LOGIC
let timerInterval = null;
let timerRemaining = 0;
let timerRunning = false;

function clearCookTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerRunning = false;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function toggleTimer(recipeId, stepIdx, originalSecs) {
  const display = document.getElementById('timer-display');
  const btn = document.getElementById('timer-btn');
  if (!timerRunning) {
    if (timerRemaining === 0) timerRemaining = originalSecs;
    timerRunning = true;
    btn.textContent = 'Pause';
    btn.className = 'cook-timer-btn pause';
    display.className = 'cook-timer-display running';
    timerInterval = setInterval(() => {
      timerRemaining--;
      display.textContent = formatTime(timerRemaining);
      if (timerRemaining <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        timerRunning = false;
        display.textContent = '00:00';
        display.className = 'cook-timer-display done';
        btn.textContent = 'Done!';
        btn.className = 'cook-timer-btn start';
        btn.disabled = true;
        const doneMsg = document.createElement('div');
        doneMsg.className = 'cook-timer-done-msg';
        doneMsg.textContent = 'Timer complete!';
        btn.parentElement.parentElement.appendChild(doneMsg);
      }
    }, 1000);
  } else {
    clearInterval(timerInterval);
    timerInterval = null;
    timerRunning = false;
    btn.textContent = 'Resume';
    btn.className = 'cook-timer-btn start';
    display.className = 'cook-timer-display';
  }
}

function resetTimer(recipeId, stepIdx, originalSecs) {
  clearCookTimer();
  timerRemaining = originalSecs;
  const display = document.getElementById('timer-display');
  const btn = document.getElementById('timer-btn');
  if (display) { display.textContent = formatTime(originalSecs); display.className = 'cook-timer-display'; }
  if (btn) { btn.textContent = 'Start timer'; btn.className = 'cook-timer-btn start'; btn.disabled = false; }
  const doneMsg = document.querySelector('.cook-timer-done-msg');
  if (doneMsg) doneMsg.remove();
}

function closeModal() {
  clearCookTimer();
  timerRemaining = 0;
  document.getElementById('overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
render();
</script>
</body>
